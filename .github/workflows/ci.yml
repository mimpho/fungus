name: CI

on:
  push:
    branches:
      - main
      - epic/**
      - feat/**
      - fix/**
      - chore/**
  pull_request:
    branches:
      - main
      - epic/**

jobs:
  # ── Unit tests — no DB, runs fast ─────────────────────────────────────────
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Upgrade pip and setuptools
        run: pip install --upgrade pip setuptools

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v
        working-directory: backend
        env:
          PYTHONPATH: .

  # ── Integration tests — requires PostgreSQL + PostGIS ─────────────────────
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit   # only run if unit tests pass

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fungus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fungus_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Upgrade pip and setuptools
        run: pip install --upgrade pip setuptools

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Run Alembic migrations
        run: alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/fungus_test

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v
        working-directory: backend
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/fungus_test
        # Integration tests don't exist yet — skip gracefully if the folder is empty
        continue-on-error: ${{ hashFiles('backend/tests/integration/*.py') == '' }}

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install ruff
        run: pip install ruff
        working-directory: backend

      - name: Run ruff
        run: ruff check app/
        working-directory: backend
